version: '3.9'

services:
  # ============================================================
  # PostgreSQL 16
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: np_manager_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: np_user
      POSTGRES_PASSWORD: np_password
      POSTGRES_DB: np_manager
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U np_user -d np_manager']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================
  # pgAdmin 4 — GUI do zarządzania bazą danych
  # Dostęp: http://localhost:5050
  # Login: admin@np-manager.local / admin123
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: np_manager_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@np-manager.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    name: np_manager_postgres_data
  pgadmin_data:
    name: np_manager_pgadmin_data
